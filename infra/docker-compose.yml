services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: tiny_gym_clickhouse
    ports:
      - "8123:8123"   # HTTP (SQL queries)
      - "9000:9000"   # native (used by otelcol exporter + Grafana)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tiny_gym_tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    # Internal only: otelcol talks via tempo:4317; Grafana reads tempo:3200.
    # Expose 3200 to host for ad-hoc curl/debug if desired.
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: tiny_gym_grafana
    ports:
      - "3000:3000"   # UI
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor traceqlSearch"
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - clickhouse

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: tiny_gym_dcgm
    cap_add:
      - SYS_ADMIN
    devices:
      - nvidia.com/gpu=all
    environment:
      DCGM_EXPORTER_LISTEN: ":9400"
      DCGM_EXPORTER_INTERVAL: "100"   # 10 Hz internal NVML poll
    # Internal only: otelcol scrapes dcgm-exporter:9400/metrics in docker net

  nvml-pid-exporter:
    build: ./nvml_pid_exporter
    container_name: tiny_gym_nvml_pid
    pid: host                  # NVML's compute-process API enumerates via host /proc
    cap_add:
      - SYS_ADMIN              # required for nvmlDeviceGetComputeRunningProcesses inside container
    devices:
      - nvidia.com/gpu=all
    volumes:
      - /proc:/hostfs/proc:ro
    # Internal only: otelcol scrapes :9401/metrics

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: tiny_gym_otelcol
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol/config.yaml:ro
      # mount host /proc and /sys (read-only) so hostmetrics receiver
      # sees real host CPU/RAM/network, not the container's namespace.
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
    ports:
      - "4317:4317"   # OTLP gRPC (external receiver — workflow.py sends here)
      - "4318:4318"   # OTLP HTTP (optional alternative)
    extra_hosts:
      # let the container reach sglang running on the host at :30000
      - "host.docker.internal:host-gateway"
    depends_on:
      clickhouse:
        condition: service_healthy
      tempo:
        condition: service_started
      dcgm-exporter:
        condition: service_started
      nvml-pid-exporter:
        condition: service_started

volumes:
  ch-data:
  tempo-data:
  grafana-data:
